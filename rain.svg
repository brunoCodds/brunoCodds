<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <style>
      .drop { animation: fall linear infinite; opacity: 0.55; }

      @keyframes fall {
        0%   { transform: translateY(-20px); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.5; }
        100% { transform: translateY(130px); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Rain drops — varied x, delay, duration, length for natural feel -->
  <g fill="#7ec8e3">
    <rect class="drop" x="12"  y="0" width="1.5" height="10" style="animation-duration:0.9s; animation-delay:0.0s"/>
